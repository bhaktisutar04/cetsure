<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CETSure — AI-powered MHT-CET college predictor. Find your best Maharashtra engineering college match based on cutoff trends, category, and percentile." />
    <meta name="theme-color" content="#0D53FC" />
    <meta property="og:title" content="CETSure — Smart CAP College Predictor" />
    <meta property="og:description" content="Predict your dream Maharashtra engineering college with 99.8% accuracy using official DTE cutoff data." />
    <meta property="og:type" content="website" />
    <title>CETSure — Smart CAP College Predictor for MHT-CET</title>

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/design-system.css" />

</head>


<body>

    <div class="container">

        <div class="card fade-up" style="overflow: hidden; position: relative;">

            <!-- Decorative gradient orbs -->
            <div style="position: absolute; top: -60px; right: -60px; width: 160px; height: 160px; background: radial-gradient(circle, rgba(13, 83, 252, 0.06) 0%, transparent 70%); border-radius: 50%; pointer-events: none;"></div>
            <div style="position: absolute; bottom: -40px; left: -40px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(255, 107, 0, 0.05) 0%, transparent 70%); border-radius: 50%; pointer-events: none;"></div>

            <img
                src="assets/logo.svg"
                alt="CETSure Logo"
                class="logo"
                style="filter: drop-shadow(0 4px 12px rgba(13, 83, 252, 0.15)); height: 52px;"
            />

            <h1 style="position: relative;">Smart CAP College Predictor</h1>
            
            <p class="subtitle" style="position: relative;">
                Predict your dream Maharashtra engineering college and plan your option form with absolute clarity.
            </p>

            <div class="trust-pills-container" style="position: relative;">
                <div class="trust-pill fade-up-1">🎯 99.8% Match Rate</div>
                <div class="trust-pill fade-up-2">🎓 350+ Colleges</div>
                <div class="trust-pill fade-up-3">⚡ Official DTE Data</div>
            </div>

            <button
                class="primary-btn fade-up-4"
                onclick="window.location.href='signup.html'"
                style="margin-top: var(--sp-6); position: relative;"
            >
                Start Free Prediction →
            </button>
            
            <div class="disclaimer-box fade-up-5" style="margin-top: var(--sp-6); text-align: center; background: var(--c-primary-surf); border-color: var(--c-primary-border); color: var(--c-primary);">
                <strong>Trusted by 10,000+ Students</strong> in Maharashtra.
            </div>

        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
