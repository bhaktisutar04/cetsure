<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - CETSure</title>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <div class="container">

        <div class="card fade-up">

            <div class="top-bar">
                <div>
                    <h1 style="margin-bottom:4px;">CETSure</h1>
                    <p class="subtitle" style="margin:0;">
                        Welcome back
                    </p>
                </div>

                <button class="logout-btn" onclick="logout()">
                    Logout
                </button>
            </div>

            <div id="profileBox"></div>

            <div class="stats-grid">

                <div class="stat-box">
                    <div class="stat-number" id="percentileBox">
                        -
                    </div>

                    <div class="stat-label">
                        Percentile
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-number" id="shortlistCount">
                        0
                    </div>

                    <div class="stat-label">
                        Shortlisted
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-number" id="predictionCount">
                        0
                    </div>

                    <div class="stat-label">
                        Predictions
                    </div>
                </div>

            </div>

            <div class="college-card">

                <div class="college-name">
                    CAP Round Countdown
                </div>

                <div class="college-detail" id="countdownText">
                    Loading countdown...
                </div>

            </div>

            <div class="results-section">

                <button class="primary-btn" onclick="goTo(ROUTES.PREDICT)">
                    Predict Colleges
                </button>

                <button class="secondary-btn" onclick="goTo('search.html')">
                    Search Colleges
                </button>

                <button class="secondary-btn" onclick="goTo('shortlist.html')">
                    My Shortlist
                </button>
                <button class="secondary-btn" onclick="goTo('compare.html')">
                    Compare Colleges
                </button>
            </div>

        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script src="js/config.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        requireAuth();
        requireProfile();

        const user = getCurrentUser();
        const profile = getProfile();

        document.getElementById("profileBox").innerHTML = `
    <div class="subtitle" style="margin-bottom:20px;">
      ${user.name} • ${profile.category}
    </div>
  `;

        document.getElementById("percentileBox").innerText =
            formatPercentile(profile.percentile);

        // Shortlist count
        const shortlist =
            // JSON.parse(localStorage.getItem("cetsure_shortlist")) || [];
            JSON.parse(localStorage.getItem(getShortlistKey())) || []
        document.getElementById("shortlistCount").innerText =
            shortlist.length;

        // Prediction count
        const predictionResults = getPredictionResults();

        let totalPredictions = 0;

        if (predictionResults) {
            totalPredictions =
                (predictionResults.safe?.length || 0) +
                (predictionResults.moderate?.length || 0) +
                (predictionResults.reach?.length || 0);
        }

        document.getElementById("predictionCount").innerText =
            totalPredictions;

        // Countdown
        function updateCountdown() {

            const targetDate = new Date("2026-07-15");

            const now = new Date();

            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById("countdownText").innerText =
                    "CAP rounds have started.";
                return;
            }

            const days =
                Math.floor(difference / (1000 * 60 * 60 * 24));

            document.getElementById("countdownText").innerHTML = `
      <strong>${days} days remaining</strong>
      for expected CAP rounds.
    `;
        }

        updateCountdown();
    </script>

</body>

</html>
