<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Your CETSure dashboard — track your MHT-CET percentile, shortlisted colleges, and CAP round countdown in one place." />
    <meta name="theme-color" content="#0D53FC" />
    <title>Dashboard — CETSure | Smart CAP College Predictor</title>

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/design-system.css" />

</head>

<body>

    <div class="container">

        <div class="card fade-up">

            <div class="top-bar">
                <div>
                    <h1 class="gradient-text" style="margin-bottom: 2px; text-align: left;">CETSure</h1>
                    <p class="subtitle"
                        style="margin: 0; text-align: left; font-size: var(--text-xs); color: var(--c-text-muted);">
                        Official CAP Round Navigator
                    </p>
                </div>

                <button class="logout-btn" onclick="logout()">
                    Logout
                </button>
            </div>

            <!-- Welcoming dynamic greeting box -->
            <div id="profileBox" style="text-align: left; margin-bottom: var(--sp-4);"></div>

            <!-- High Fidelity Stats KPI Cards -->
            <div class="stats-grid">

                <div class="stat-box">
                    <div class="stat-number" id="percentileBox">
                        -
                    </div>

                    <div class="stat-label">
                        Percentile
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-number" id="shortlistCount">
                        0
                    </div>

                    <div class="stat-label">
                        Saved
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-number" id="predictionCount">
                        0
                    </div>

                    <div class="stat-label">
                        Matches
                    </div>
                </div>

            </div>

            <!-- Pulsing Urgency Banner for expected CAP admission rounds -->
            <div class="countdown-card">
                <div class="pulse-dot"></div>
                <div class="countdown-content" id="countdownText">
                    Loading countdown...
                </div>
            </div>

            <!-- EdTech Dashboard Action Cards -->
            <h2 class="section-title"
                style="margin-top: var(--sp-6); margin-bottom: var(--sp-3); font-size: var(--text-md);">Navigation
                Center</h2>

            <div class="dashboard-actions-grid">

                <div class="action-card fade-up-1" onclick="goTo(ROUTES.PREDICT)"
                    style="background: linear-gradient(135deg, var(--c-primary-surf) 0%, #FFFFFF 100%); border-color: var(--c-primary-border);">
                    <div class="action-icon-box primary">🎯</div>
                    <div>
                        <div class="action-card-title" style="color: var(--c-primary);">Predict Colleges</div>
                        <div class="action-card-subtitle">Match MHT-CET cutoffs</div>
                    </div>
                </div>

                <div class="action-card fade-up-2" onclick="goTo('search.html')">
                    <div class="action-icon-box subtle">🔍</div>
                    <div>
                        <div class="action-card-title">Search Colleges</div>
                        <div class="action-card-subtitle">Search codes &amp; locations</div>
                    </div>
                </div>

                <div class="action-card fade-up-3" onclick="goTo('shortlist.html')">
                    <div class="action-icon-box subtle">❤️</div>
                    <div>
                        <div class="action-card-title">Option Shortlist</div>
                        <div class="action-card-subtitle">Plan priority order</div>
                    </div>
                </div>

                <div class="action-card fade-up-4" onclick="goTo('compare.html')">
                    <div class="action-icon-box subtle">📊</div>
                    <div>
                        <div class="action-card-title">Compare Options</div>
                        <div class="action-card-subtitle">Side-by-side cutoff check</div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script src="js/config.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        requireAuth();
        requireProfile();

        const user = getCurrentUser();
        const profile = getProfile();

        document.getElementById("profileBox").innerHTML = `
    <div class="subtitle" style="margin-bottom:20px;">
      ${user.name} • ${profile.category}
    </div>
  `;

        document.getElementById("percentileBox").innerText =
            formatPercentile(profile.percentile);

        // Shortlist count
        const shortlist =
            // JSON.parse(localStorage.getItem("cetsure_shortlist")) || [];
            JSON.parse(localStorage.getItem(getShortlistKey())) || []
        document.getElementById("shortlistCount").innerText =
            shortlist.length;

        // Prediction count
        const predictionResults = getPredictionResults();

        let totalPredictions = 0;

        if (predictionResults) {
            totalPredictions =
                (predictionResults.safe?.length || 0) +
                (predictionResults.moderate?.length || 0) +
                (predictionResults.reach?.length || 0);
        }

        document.getElementById("predictionCount").innerText =
            totalPredictions;

        // Countdown
        function updateCountdown() {

            const targetDate = new Date("2026-07-15");

            const now = new Date();

            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById("countdownText").innerText =
                    "CAP rounds have started.";
                return;
            }

            const days =
                Math.floor(difference / (1000 * 60 * 60 * 24));

            document.getElementById("countdownText").innerHTML = `
      <strong>${days} days remaining</strong>
      for expected CAP rounds.
    `;
        }

        updateCountdown();
    </script>

</body>

</html>
