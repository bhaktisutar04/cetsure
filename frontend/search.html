<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Colleges - CETSure</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="container">
    <div class="card fade-up">

      <button class="secondary-btn" onclick="goTo(ROUTES.HOME)">
        ← Back Home
      </button>

      <h1>Search Colleges</h1>

      <p class="subtitle">
        Search by college name or college code.
      </p>

      <div class="form-group">
        <label>College Name / Code</label>
        <input type="text" id="searchInput" placeholder="Example: COEP, 6006, Pune" />
      </div>

      <button class="primary-btn" onclick="handleSearch()">
        Search
      </button>

      <div id="searchResults" class="results-section"></div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>

  <script>
    requireAuth();

    async function handleSearch() {
      const query = document.getElementById("searchInput").value.trim();
      const resultsBox = document.getElementById("searchResults");

      if (query.length < 2) {
        showMessage("Please enter at least 2 characters.");
        return;
      }

      resultsBox.innerHTML = `<div class="empty-state">Searching...</div>`;

      try {
        const data = await searchColleges(query);
        const colleges = data.results || [];

        if (!colleges.length) {
          resultsBox.innerHTML = `
          <div class="empty-state">
            No colleges found.
          </div>
        `;
          return;
        }

        let html = `<h2 class="section-title">Results (${colleges.length})</h2>`;

        colleges.forEach((college) => {
          html += `
          <div class="college-card">
            <div class="college-name">
              ${college.college_name}
            </div>

            <div class="college-detail">
              College Code: <strong>${college.college_code}</strong>
            </div>

            <button
              class="primary-btn"
              onclick="openCollege('${college.college_code}')"
            >
              View Details
            </button>
          </div>
        `;
        });

        resultsBox.innerHTML = html;

      } catch (error) {
        console.error(error);
        resultsBox.innerHTML = `
        <div class="empty-state">
          ${error.message}
        </div>
      `;
      }
    }

    function openCollege(code) {
      localStorage.setItem("cetsure_selected_college", code);
      goTo("college.html");
    }
  </script>

</body>

</html>
