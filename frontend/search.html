<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Search for any Maharashtra engineering college — CETSure."/>
  <title>Search Colleges — CETSure</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="dot-grid"></div>

  <main class="page">
    <div class="px-20" style="padding-top:28px; position:relative; z-index:1;">

      <h1 class="font-heading" style="font-size:24px; font-weight:700; letter-spacing:-0.02em; margin-bottom:20px;">
        Search Colleges
      </h1>

      <!-- Search box -->
      <div class="form-group search-wrapper">
        <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="search" class="form-input search-input" id="search-input"
               placeholder="Type college name…" autocomplete="off" autocorrect="off"
               spellcheck="false"/>
      </div>

      <!-- Status text -->
      <p class="text-sm text-muted" id="search-status" style="margin-bottom:16px; min-height:20px;"></p>

      <!-- Results -->
      <div id="search-results"></div>

      <!-- Empty / start state -->
      <div id="search-empty" class="empty-state">
        <div class="empty-state__icon">🏫</div>
        <div class="empty-state__title">Find any college</div>
        <p class="empty-state__text">Type at least 2 characters to search all Maharashtra engineering colleges.</p>
      </div>

    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    protectPage();
    loadNavbar();

    let debounceTimer = null;
    const input   = document.getElementById('search-input');
    const results = document.getElementById('search-results');
    const status  = document.getElementById('search-status');
    const empty   = document.getElementById('search-empty');

    input.focus();

    input.addEventListener('input', () => {
      const q = input.value.trim();
      clearTimeout(debounceTimer);

      if (q.length < 2) {
        results.innerHTML = '';
        status.textContent = '';
        empty.style.display = 'flex';
        return;
      }

      status.textContent = 'Searching…';
      empty.style.display = 'none';

      debounceTimer = setTimeout(async () => {
        try {
          const data = await searchColleges(q);
          const list = data.results || [];
          status.textContent = list.length
            ? `${list.length} college${list.length !== 1 ? 's' : ''} found`
            : '';
          renderResults(list, q);
        } catch (err) {
          status.textContent = 'Search failed. Try again.';
          results.innerHTML = '';
        }
      }, 300);
    });

    function renderResults(list, query) {
      if (list.length === 0) {
        results.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">🔍</div>
            <div class="empty-state__title">No colleges found</div>
            <p class="empty-state__text">Try a different name or check the spelling.</p>
          </div>`;
        return;
      }
      results.innerHTML = list.map(c => `
        <a href="college.html?code=${encodeURIComponent(c.college_code)}" class="search-result">
          <div>
            <div class="search-result__name">${highlight(escHtml(c.college_name), query)}</div>
            <div class="search-result__code">Code: ${escHtml(c.college_code)}</div>
          </div>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </a>
      `).join('');
    }

    function highlight(text, query) {
      const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      return text.replace(re, '<mark style="background:rgba(245,166,35,0.3);color:var(--accent);border-radius:2px;">$1</mark>');
    }

    function escHtml(str) {
      return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
