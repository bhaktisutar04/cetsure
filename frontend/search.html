<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Colleges - CETSure</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/design-system.css" />

</head>

<body>

  <div class="container">
    <div class="card fade-up">

      <button class="secondary-btn" onclick="goTo(ROUTES.HOME)" style="width: auto; min-height: auto; padding: var(--sp-2) var(--sp-4); font-size: var(--text-xs); margin-top: 0; display: inline-flex; align-self: flex-start;">
        &larr; Back Home
      </button>

      <h1 class="gradient-text" style="display: block; text-align: center; margin-top: var(--sp-4);">Search Cutoffs</h1>

      <p class="subtitle" style="font-size: var(--text-sm); margin-bottom: var(--sp-6);">
        Lookup official DTE engineering college codes and locations.
      </p>

      <div class="form-group" style="margin-bottom: var(--sp-2);">
        <label>College Name / Code</label>
        <input type="text" id="searchInput" placeholder="Example: COEP, VJTI, 6006" />
      </div>

      <div style="font-size: 11px; margin-bottom: var(--sp-5); display: flex; gap: 6px; flex-wrap: wrap; align-items: center;">
        <span style="color: var(--c-text-muted);">Try:</span>
        <span onclick="document.getElementById('searchInput').value='COEP'; handleSearch();" style="color: var(--c-primary); cursor: pointer; font-weight: var(--fw-semibold); background: var(--c-primary-surf); padding: 2px 8px; border-radius: var(--r-sm);">COEP</span>
        <span onclick="document.getElementById('searchInput').value='VJTI'; handleSearch();" style="color: var(--c-primary); cursor: pointer; font-weight: var(--fw-semibold); background: var(--c-primary-surf); padding: 2px 8px; border-radius: var(--r-sm);">VJTI</span>
        <span onclick="document.getElementById('searchInput').value='PICT'; handleSearch();" style="color: var(--c-primary); cursor: pointer; font-weight: var(--fw-semibold); background: var(--c-primary-surf); padding: 2px 8px; border-radius: var(--r-sm);">PICT</span>
        <span onclick="document.getElementById('searchInput').value='6006'; handleSearch();" style="color: var(--c-primary); cursor: pointer; font-weight: var(--fw-semibold); background: var(--c-primary-surf); padding: 2px 8px; border-radius: var(--r-sm);">Code 6006</span>
      </div>

      <button class="primary-btn" onclick="handleSearch()" style="margin-top: 0;">
        Search
      </button>

      <div id="searchResults" class="results-section"></div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>

  <script>
    requireAuth();

    async function handleSearch() {
      const query = document.getElementById("searchInput").value.trim();
      const resultsBox = document.getElementById("searchResults");

      if (query.length < 2) {
        showMessage("Please enter at least 2 characters.");
        return;
      }

      resultsBox.innerHTML = `<div class="empty-state">Searching database...</div>`;

      try {
        const data = await searchColleges(query);
        const colleges = data.results || [];

        if (!colleges.length) {
          resultsBox.innerHTML = `
          <div class="empty-state">
            No colleges found matching "${query}".
          </div>
        `;
          return;
        }

        let html = `<h2 class="section-title">Found (${colleges.length})</h2>`;

        colleges.forEach((college) => {
          html += `
          <div class="college-card fade-up" style="display: flex; justify-content: space-between; align-items: center; gap: var(--sp-4);">
            <div style="flex:1;">
              <div class="college-name" style="margin-bottom: 4px; font-size: var(--text-base);">
                ${college.college_name}
              </div>
              <div class="college-detail" style="margin: 0; font-size: var(--text-xs);">
                Code: <strong>${college.college_code}</strong>
              </div>
            </div>
            <button
              class="primary-btn"
              onclick="openCollege('${college.college_code}')"
              style="margin: 0; width: auto; min-height: 40px; height: 40px; padding: 0 var(--sp-4); font-size: var(--text-xs);"
            >
              View &rarr;
            </button>
          </div>
        `;
        });

        resultsBox.innerHTML = html;

      } catch (error) {
        console.error(error);
        resultsBox.innerHTML = `
        <div class="empty-state">
          ${error.message}
        </div>
      `;
      }
    }

    function openCollege(code) {
      localStorage.setItem("cetsure_selected_college", code);
      goTo("college.html");
    }
  </script>

</body>

</html>
