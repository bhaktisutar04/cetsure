<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Your CETSure prediction results — Safe, Moderate, and Reach college matches based on MHT-CET CAP Round 1 cutoff trends." />
  <meta name="theme-color" content="#0D53FC" />
  <title>Prediction Results — CETSure | Smart CAP College Predictor</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/design-system.css" />

</head>

<body>

  <div class="container">
    <div class="card fade-up">

      <button class="secondary-btn" onclick="goTo(ROUTES.PREDICT)"
        style="width: auto; min-height: auto; padding: var(--sp-2) var(--sp-4); font-size: var(--text-xs); margin-top: 0; display: inline-flex; align-self: flex-start;">
        &larr; Try Again
      </button>

      <h1 class="gradient-text" style="display: block; text-align: center; margin-top: var(--sp-4);">Your Predictions
      </h1>
      <div class="prediction-note" style="text-align: center;">
        CETSure predicts CAP Round <span id="capRoundLabel">1</span> chances using previous CAP Round cutoff trends.
      </div>

      <div id="metaInfo" class="subtitle"
        style="font-size: var(--text-sm); font-weight: var(--fw-semibold); color: var(--c-text-secondary); margin-bottom: var(--sp-6);">
      </div>

      <div class="stats-grid">
        <div class="stat-box safe" style="border-radius: var(--r-md); border-width: 1px;">
          <div class="stat-number" id="safeCount" style="color: var(--c-safe-text);">0</div>
          <div class="stat-label" style="color: var(--c-safe-text);">Safe</div>
        </div>

        <div class="stat-box moderate" style="border-radius: var(--r-md); border-width: 1px;">
          <div class="stat-number" id="moderateCount" style="color: var(--c-moderate-text);">0</div>
          <div class="stat-label" style="color: var(--c-moderate-text);">Moderate</div>
        </div>

        <div class="stat-box reach" style="border-radius: var(--r-md); border-width: 1px;">
          <div class="stat-number" id="reachCount" style="color: var(--c-reach-text);">0</div>
          <div class="stat-label" style="color: var(--c-reach-text);">Reach</div>
        </div>
      </div>

      <div id="resultsContainer"></div>
      <div class="disclaimer-box" style="margin-top: var(--sp-6);">
        <strong>Note:</strong>
        These predictions are based on previous cutoff trends.
        Final admission depends on official CAP rounds, seat availability,
        category rules, and student preferences.
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    requireAuth();

    const results = getPredictionResults();

    if (!results) {
      showMessage("No prediction results found.");
      goTo(ROUTES.PREDICT);
    }

    const safe = results.safe || [];
    const moderate = results.moderate || [];
    const reach = results.reach || [];

    document.getElementById("safeCount").innerText = safe.length;
    document.getElementById("moderateCount").innerText = moderate.length;
    document.getElementById("reachCount").innerText = reach.length;

    document.getElementById("capRoundLabel").innerText = results.meta.cap_round || 1;

    document.getElementById("metaInfo").innerHTML = `
    <strong>${results.meta.branch}</strong><br>
    ${results.meta.category} • ${results.meta.percentile} percentile • 
    ${results.meta.district || "All Maharashtra"} • CAP Round ${results.meta.cap_round || 1}
  `;

    const resultsContainer = document.getElementById("resultsContainer");

    function badgeClass(bucket) {
      if (bucket === "SAFE") return "safe";
      if (bucket === "MODERATE") return "moderate";
      return "reach";
    }

    function saveCollege(college) {
      let saved = JSON.parse(localStorage.getItem(getShortlistKey())) || [];

      const exists = saved.find(
        (item) =>
          item.college_code === college.college_code &&
          item.branch_name === college.branch_name
      );

      if (exists) {
        showMessage("This college is already in your shortlist.");
        return;
      }

      saved.push(college);
      localStorage.setItem(getShortlistKey(), JSON.stringify(saved));
      showMessage("College saved to shortlist.");
    }

    function saveCollegeByIndex(bucket, index) {
      let college = null;

      if (bucket === "SAFE") {
        college = safe[index];
      } else if (bucket === "MODERATE") {
        college = moderate[index];
      } else {
        college = reach[index];
      }

      if (!college) {
        showMessage("Unable to save this college.");
        return;
      }

      saveCollege(college);
    }

    function openCollegeDetails(code) {
      localStorage.setItem("cetsure_selected_college", code);
      goTo("college.html");
    }

    function renderSection(title, colleges, bucket) {
      let html = `
      <div class="results-section">
        <h2 class="section-title">${title} (${colleges.length})</h2>
    `;

      if (!colleges.length) {
        html += `
        <div class="empty-state">
          No colleges found in this section.
        </div>
      </div>`;
        resultsContainer.innerHTML += html;
        return;
      }

      colleges.forEach((college, index) => {
        const bucketClassLower = badgeClass(bucket).toLowerCase();
        html += `
        <div class="college-card fade-up ${bucketClassLower}">

          <span class="badge ${badgeClass(bucket)}">
            ${bucket}
          </span>

          <div class="college-name">
            ${college.college_name}
          </div>

          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--sp-2) var(--sp-3); margin-bottom: var(--sp-3);">
            <div class="college-detail" style="margin:0;">
              📍 ${college.district || "-"}
            </div>

            <div class="college-detail" style="margin:0;">
              🎓 ${college.branch_name}
            </div>

            <div class="college-detail" style="margin:0;">
              🕒 Last Year: <strong>${college.last_year_cutoff || "-"}</strong>
            </div>

            <div class="college-detail" style="margin:0;">
              ⭐ Chance: <strong style="color: var(--c-${bucketClassLower}-text);">${college.chance_score}%</strong>
            </div>
          </div>

          <div style="text-align: left; margin-top: 10px; font-size: var(--text-xs); color: var(--c-text-secondary); background: var(--c-surface-alt); border-radius: var(--r-sm); padding: var(--sp-3); border-left: 3px solid var(--c-${bucketClassLower}-border); line-height: 1.45;">
            💡 <strong>Counselor Tip:</strong> ${college.reason}
          </div>

          <div style="display: flex; gap: var(--sp-2); margin-top: var(--sp-3);">
            <button
              class="primary-btn"
              onclick="saveCollegeByIndex('${bucket}', ${index})"
              style="margin:0; flex:1; min-height: 44px; padding: 10px var(--sp-2); font-size: var(--text-xs);"
            >
              Save List
            </button>

            <button
              class="secondary-btn"
              onclick="openCollegeDetails('${college.college_code}')"
              style="margin:0; flex:1; min-height: 44px; padding: 10px var(--sp-2); font-size: var(--text-xs);"
            >
              Details &rarr;
            </button>
          </div>

        </div>
      `;
      });

      html += `</div>`;
      resultsContainer.innerHTML += html;
    }

    renderSection("Safe Colleges", safe, "SAFE");
    renderSection("Moderate Colleges", moderate, "MODERATE");
    renderSection("Reach Colleges", reach, "REACH");
  </script>

</body>

</html>
