<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Your personalised Safe, Moderate and Reach college list — CETSure."/>
  <title>Your Results — CETSure</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="dot-grid"></div>

  <main class="page">

    <!-- Page header -->
    <div class="page-header">
      <a href="predict.html" class="back-btn" id="back-btn" title="Back">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div>
        <h1 class="page-title">Your Results</h1>
        <p id="results-meta" class="text-xs text-muted" style="margin-top:2px;"></p>
      </div>
    </div>

    <!-- Summary bar -->
    <div class="summary-bar" id="summary-bar">
      <div class="summary-chip summary-chip--safe">
        <span class="summary-chip__num" id="safe-count">0</span>
        <span class="summary-chip__label">Safe</span>
      </div>
      <div class="summary-chip summary-chip--moderate">
        <span class="summary-chip__num" id="mod-count">0</span>
        <span class="summary-chip__label">Moderate</span>
      </div>
      <div class="summary-chip summary-chip--reach">
        <span class="summary-chip__num" id="reach-count">0</span>
        <span class="summary-chip__label">Reach</span>
      </div>
    </div>

    <!-- Results list -->
    <div id="results-container" class="px-20" style="position:relative; z-index:1; padding-bottom:20px;">
      <!-- Injected by JS -->
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" style="display:none;">
      <div class="empty-state__icon">🔍</div>
      <div class="empty-state__title">No colleges found</div>
      <p class="empty-state__text">Try a different branch, district, or check your percentile.</p>
      <a href="predict.html" class="btn btn-primary" style="margin-top:16px;">Try Again</a>
    </div>

  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    protectPage();
    loadNavbar();

    // Read from sessionStorage first, fall back to localStorage mirror
    const data = (() => {
      try {
        return JSON.parse(sessionStorage.getItem('cetsure_results'))
          || JSON.parse(localStorage.getItem('cetsure_results_mirror'))
          || null;
      } catch { return null; }
    })();

    if (!data) {
      window.location.href = 'predict.html';
      // CRITICAL: stop JS execution so null is never destructured
      throw new Error('No results data — redirecting.');
    }

    const { safe = [], moderate = [], reach = [], meta = {} } = data;
    const total = safe.length + moderate.length + reach.length;

    // Update counts
    document.getElementById('safe-count').textContent  = safe.length;
    document.getElementById('mod-count').textContent   = moderate.length;
    document.getElementById('reach-count').textContent = reach.length;

    if (meta.branch) {
      document.getElementById('results-meta').textContent =
        `${meta.branch} · ${meta.category} · ${formatPercentile(meta.percentile)} percentile`;
    }

    // Save last prediction stats for home page
    localStorage.setItem('cetsure_last_stats', JSON.stringify({
      safe: safe.length, moderate: moderate.length, reach: reach.length,
      branch: meta.branch, ts: Date.now()
    }));

    if (total === 0) {
      document.getElementById('empty-state').style.display = 'flex';
    } else {
      const container = document.getElementById('results-container');
      container.innerHTML = buildSection('safe', safe, '✓ Safe', 'You are very likely to get these')
        + buildSection('moderate', moderate, '⚡ Moderate', 'These could go either way')
        + buildSection('reach', reach, '🔥 Reach', 'Difficult but not impossible');

      // Open SAFE by default
      const safeSection = document.getElementById('section-safe');
      if (safeSection && safe.length > 0) safeSection.classList.add('open');

      // Collapsible toggle
      container.querySelectorAll('.result-section__header').forEach(header => {
        header.addEventListener('click', () => {
          const section = header.closest('.result-section');
          section.classList.toggle('open');
        });
      });

      // Save to shortlist
      container.addEventListener('click', (e) => {
        const btn = e.target.closest('.heart-btn');
        if (!btn) return;
        const card = btn.closest('.college-card');
        const college = JSON.parse(card.dataset.college);
        const saved = saveToShortlist(college);
        if (saved) {
          btn.classList.add('saved');
          btn.title = 'Saved to shortlist';
          showToast(`${college.college_name.substring(0,30)}… saved!`, 'success');
        } else {
          showToast('Already in your shortlist.', 'info');
        }
      });
    }

    function buildSection(type, colleges, label, subtext) {
      if (colleges.length === 0) return '';
      const cards = colleges.map(c => buildCard(c)).join('');
      return `
        <div class="result-section" id="section-${type}">
          <div class="result-section__header result-section__header--${type}">
            <div class="result-section__label result-section__label--${type}">
              ${label}
              <span class="badge badge-${type}" style="font-size:10px;">${colleges.length}</span>
            </div>
            <div class="result-section__count">
              <p class="text-xs text-muted">${subtext}</p>
              <span class="result-section__chevron">▾</span>
            </div>
          </div>
          <div class="result-section__body">${cards}</div>
        </div>
      `;
    }

    function buildCard(c) {
      const trend = getTrendArrow(c.trend);
      const cutoff = formatPercentile(c.weighted_cutoff);
      const inList = isInShortlist(c.college_code, c.branch_name);
      const enc = encodeURIComponent(JSON.stringify(c));
      return `
        <div class="college-card" data-college='${JSON.stringify(c).replace(/'/g,"&#39;")}'>
          <div class="college-card__name">${escHtml(c.college_name)}</div>
          <div class="college-card__branch">${escHtml(c.branch_name)}</div>
          <div class="college-card__stats">
            <div class="college-card__cutoff">
              <span class="college-card__cutoff-val">${cutoff}</span>
              <span class="college-card__cutoff-label">Predicted cutoff</span>
            </div>
            <div class="college-card__actions">
              <span class="trend-badge trend-badge--${trend.cls}" title="${c.trend}">
                ${trend.icon} ${c.trend || 'STABLE'}
              </span>
              <button class="heart-btn ${inList ? 'saved' : ''}" title="${inList ? 'Saved' : 'Save to shortlist'}">♥</button>
              <a href="college.html?code=${encodeURIComponent(c.college_code)}" class="view-btn">
                Details →
              </a>
            </div>
          </div>
        </div>
      `;
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
