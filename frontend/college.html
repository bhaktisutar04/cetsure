<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Details - CETSure</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="container">
    <div class="card fade-up">

      <button class="secondary-btn" onclick="goTo('search.html')">
        ← Back to Search
      </button>

      <h1 id="collegeName">College Details</h1>

      <p class="subtitle" id="collegeCode"></p>

      <button class="primary-btn" onclick="saveCollegeFromDetails()">
        Save College
      </button>

      <div id="collegeDetails">
        <div class="empty-state">Loading college details...</div>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>

  <script>
    requireAuth();

    const selectedCode = localStorage.getItem("cetsure_selected_college");
    let currentCollegeData = null;

    if (!selectedCode) {
      showMessage("No college selected.");
      goTo("search.html");
    }

    async function loadCollegeDetails() {
      const detailsBox = document.getElementById("collegeDetails");

      try {
        const data = await getCollegeDetails(selectedCode);
        currentCollegeData = data;

        document.getElementById("collegeName").innerText =
          data.college_name;

        document.getElementById("collegeCode").innerHTML =
          `College Code: <strong>${data.college_code}</strong>`;

        const cutoffs = data.cutoffs || [];

        if (!cutoffs.length) {
          detailsBox.innerHTML = `
          <div class="empty-state">
            No cutoff data found.
          </div>
        `;
          return;
        }

        let html = `
        <div class="results-section">
          <h2 class="section-title">Cutoff History</h2>
      `;

        cutoffs.slice(0, 50).forEach((item) => {
          html += `
          <div class="college-card">

            <div class="college-name">
              ${item.branch_name}
            </div>

            <span class="badge safe">
              ${item.year}
            </span>

            <div class="college-detail">
              Category:
              <strong>${item.category}</strong>
            </div>

            <div class="college-detail">
              CAP Round:
              <strong>${item.cap_round}</strong>
            </div>

            <div class="college-detail">
              Closing Percentile:
              <strong>${item.closing_percentile || "-"}</strong>
            </div>

            <div class="college-detail">
              Closing Rank:
              <strong>${item.closing_rank || "-"}</strong>
            </div>

          </div>
        `;
        });

        html += `</div>`;
        detailsBox.innerHTML = html;

      } catch (error) {
        console.error(error);

        detailsBox.innerHTML = `
        <div class="empty-state">
          ${error.message}
        </div>
      `;
      }
    }

    function saveCollegeFromDetails() {
      if (!currentCollegeData) {
        showMessage("College data is still loading.");
        return;
      }

      let saved = JSON.parse(localStorage.getItem(getShortlistKey())) || [];

      const collegeToSave = {
        college_code: currentCollegeData.college_code,
        college_name: currentCollegeData.college_name,
        branch_name: "General College Save",
        district: "-",
        weighted_cutoff: "-",
        chance_score: "-",
      };

      const exists = saved.find(
        (item) =>
          item.college_code === collegeToSave.college_code &&
          item.branch_name === collegeToSave.branch_name
      );

      if (exists) {
        showMessage("This college is already saved.");
        return;
      }

      saved.push(collegeToSave);

      localStorage.setItem(getShortlistKey(), JSON.stringify(saved));

      showMessage("College saved to shortlist.");
    }

    loadCollegeDetails();
  </script>

</body>

</html>
