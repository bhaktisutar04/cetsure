<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Full cutoff history for a Maharashtra engineering college — CETSure."/>
  <title>College Detail — CETSure</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: var(--radius);
      border: 1px solid var(--border-light);
    }
    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-chip.active {
      background: var(--accent-dim);
      border-color: rgba(245,166,35,0.4);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="dot-grid"></div>

  <main class="page">
    <!-- Header -->
    <div class="page-header">
      <a onclick="history.back()" class="back-btn" id="back-btn" title="Back" style="cursor:pointer;">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="page-title" id="college-name-heading">Loading…</h1>
    </div>

    <div class="px-20" style="padding-top:20px; position:relative; z-index:1; padding-bottom:20px;">

      <!-- College info card -->
      <div class="card card--accent mb-20" id="college-info-card" style="display:none;">
        <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
          <div>
            <p id="college-code-badge" class="text-xs text-muted mb-8"></p>
            <h2 id="college-name-card" class="font-heading" style="font-size:18px; font-weight:700; margin-bottom:6px;"></h2>
          </div>
          <button id="btn-save-shortlist" class="heart-btn" title="Save to shortlist" style="flex-shrink:0;">♥</button>
        </div>
      </div>

      <!-- Filter chips by year -->
      <p class="section-title">Cutoff History</p>
      <div class="filter-row" id="year-filter-row">
        <button class="filter-chip active" data-year="all">All Years</button>
      </div>

      <!-- Cutoff table -->
      <div class="table-wrap" id="table-wrap">
        <table class="cutoff-table" id="cutoff-table">
          <thead>
            <tr>
              <th>Year</th>
              <th>Round</th>
              <th>Category</th>
              <th>Branch</th>
              <th>Percentile</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding:32px;">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- No data state -->
      <div id="no-data" class="empty-state" style="display:none;">
        <div class="empty-state__icon">📋</div>
        <div class="empty-state__title">No cutoff data</div>
        <p class="empty-state__text">We don't have cutoff history for this college yet.</p>
      </div>

    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    protectPage();
    loadNavbar();

    const code = getParam('code');
    if (!code) { window.location.href = 'search.html'; }

    let allCutoffs = [];
    let activeYear = 'all';

    async function loadCollege() {
      try {
        showLoading('Loading college data…');
        const data = await getCollegeDetail(code);
        hideLoading();

        document.getElementById('college-name-heading').textContent = data.college_name;
        document.getElementById('college-name-card').textContent    = data.college_name;
        document.getElementById('college-code-badge').textContent   = `Code: ${data.college_code}`;
        document.getElementById('college-info-card').style.display  = 'block';

        allCutoffs = data.cutoffs || [];

        // Save shortlist button
        const saveBtn = document.getElementById('btn-save-shortlist');
        const mock = { college_code: data.college_code, college_name: data.college_name, branch_name: '', bucket: '' };
        if (isInShortlist(data.college_code, '')) saveBtn.classList.add('saved');
        saveBtn.addEventListener('click', () => {
          const saved = saveToShortlist(mock);
          if (saved) {
            saveBtn.classList.add('saved');
            showToast('Saved to shortlist!', 'success');
          } else {
            showToast('Already in shortlist.', 'info');
          }
        });

        // Build year filters
        const years = [...new Set(allCutoffs.map(c => c.year))].sort((a,b) => b - a);
        const filterRow = document.getElementById('year-filter-row');
        years.forEach(y => {
          const btn = document.createElement('button');
          btn.className = 'filter-chip';
          btn.dataset.year = y;
          btn.textContent = y;
          filterRow.appendChild(btn);
        });

        filterRow.addEventListener('click', (e) => {
          const chip = e.target.closest('.filter-chip');
          if (!chip) return;
          filterRow.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeYear = chip.dataset.year;
          renderTable();
        });

        renderTable();

      } catch (err) {
        hideLoading();
        document.getElementById('table-wrap').style.display = 'none';
        document.getElementById('no-data').style.display = 'flex';
        document.getElementById('college-name-heading').textContent = 'College';
        showToast(err.message || 'Failed to load college data.', 'error');
      }
    }

    function renderTable() {
      const rows = activeYear === 'all'
        ? allCutoffs
        : allCutoffs.filter(c => String(c.year) === String(activeYear));

      const tbody = document.getElementById('table-body');
      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px;">No data for this filter.</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(c => `
        <tr>
          <td><span class="cutoff-year">${c.year}</span></td>
          <td>${c.cap_round}</td>
          <td>${escHtml(c.category)}</td>
          <td style="font-size:12px; max-width:120px; white-space:normal;">${escHtml(c.branch_name)}</td>
          <td style="font-weight:600; color:var(--accent);">${c.closing_percentile != null ? parseFloat(c.closing_percentile).toFixed(2) : '—'}</td>
        </tr>
      `).join('');
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadCollege();
  </script>
</body>
</html>
