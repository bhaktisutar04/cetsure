<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Your saved college shortlist — drag to reorder for option form — CETSure."/>
  <title>My Shortlist — CETSure</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="dot-grid"></div>

  <main class="page">
    <div class="page-header">
      <a onclick="history.back()" class="back-btn" style="cursor:pointer;">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div>
        <h1 class="page-title">My Shortlist</h1>
        <p class="text-xs text-muted" id="shortlist-count" style="margin-top:2px;"></p>
      </div>
    </div>

    <div class="px-20" style="padding-top:20px; position:relative; z-index:1;">

      <!-- Tip -->
      <div class="card card--accent mb-16" id="drag-tip" style="display:none;">
        <p class="text-sm" style="display:flex; align-items:center; gap:8px;">
          <span>⇅</span>
          <span>Drag cards to set your option form priority order.</span>
        </p>
      </div>

      <!-- Shortlist items -->
      <div id="shortlist-list"></div>

      <!-- Empty state -->
      <div id="shortlist-empty" class="empty-state" style="display:none;">
        <div class="empty-state__icon">🤍</div>
        <div class="empty-state__title">Your shortlist is empty</div>
        <p class="empty-state__text">Tap ♥ on any college in your results to save it here.</p>
        <a href="predict.html" class="btn btn-primary" style="margin-top:20px;">Find Colleges</a>
      </div>

      <!-- Export placeholder -->
      <div id="export-area" style="margin-top:20px; display:none;">
        <button class="btn btn-ghost btn-ghost--full" id="btn-export" disabled style="opacity:0.4; cursor:not-allowed;">
          📥 Export as PDF (coming soon)
        </button>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    protectPage();
    loadNavbar();

    let shortlist = getShortlistLocal();
    let dragSrc = null;

    function render() {
      const list = document.getElementById('shortlist-list');
      const empty = document.getElementById('shortlist-empty');
      const tip = document.getElementById('drag-tip');
      const exportArea = document.getElementById('export-area');
      const countEl = document.getElementById('shortlist-count');

      if (shortlist.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'flex';
        tip.style.display = 'none';
        exportArea.style.display = 'none';
        countEl.textContent = '';
      } else {
        empty.style.display = 'none';
        tip.style.display = 'block';
        exportArea.style.display = 'block';
        countEl.textContent = `${shortlist.length} college${shortlist.length !== 1 ? 's' : ''} saved`;

        list.innerHTML = shortlist.map((c, i) => `
          <div class="shortlist-item" draggable="true" data-index="${i}" id="sitem-${i}">
            <div class="drag-handle" title="Drag to reorder">
              <span></span><span></span><span></span>
            </div>
            <div class="shortlist-item__info">
              <div class="shortlist-item__name">${escHtml(c.college_name)}</div>
              <div class="shortlist-item__branch">${escHtml(c.branch_name || '—')}
                ${c.bucket ? `<span class="badge badge-${(c.bucket||'').toLowerCase()}" style="margin-left:6px;">${c.bucket}</span>` : ''}
              </div>
            </div>
            <button class="remove-btn" data-index="${i}" title="Remove">×</button>
          </div>
        `).join('');

        // Remove buttons
        list.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.index);
            shortlist.splice(idx, 1);
            localStorage.setItem('cetsure_shortlist', JSON.stringify(shortlist));
            render();
            showToast('Removed from shortlist.', 'info');
          });
        });

        // Drag-to-reorder
        list.querySelectorAll('.shortlist-item').forEach(item => {
          item.addEventListener('dragstart', () => {
            dragSrc = item;
            item.classList.add('dragging');
          });
          item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            list.querySelectorAll('.shortlist-item').forEach(i => i.classList.remove('drag-over'));
          });
          item.addEventListener('dragover', (e) => {
            e.preventDefault();
            list.querySelectorAll('.shortlist-item').forEach(i => i.classList.remove('drag-over'));
            item.classList.add('drag-over');
          });
          item.addEventListener('drop', (e) => {
            e.preventDefault();
            if (dragSrc === item) return;
            const fromIdx = parseInt(dragSrc.dataset.index);
            const toIdx   = parseInt(item.dataset.index);
            const moved   = shortlist.splice(fromIdx, 1)[0];
            shortlist.splice(toIdx, 0, moved);
            localStorage.setItem('cetsure_shortlist', JSON.stringify(shortlist));
            render();
          });
        });
      }
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    render();
  </script>
</body>
</html>
