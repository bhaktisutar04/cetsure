<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Set up your CETSure profile — percentile, category, stream."/>
  <title>Profile Setup — CETSure</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="dot-grid"></div>

  <main class="page page--no-nav">
    <div class="px-20" style="padding-top: 52px; position:relative; z-index:1;">

      <!-- Logo -->
      <div style="margin-bottom:32px;">
        <img src="assets/logo.svg" alt="CETSure" height="28"/>
      </div>

      <!-- Step indicator -->
      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <span class="step-label">Step 1 of 2 — Your Profile</span>
      </div>

      <h1 class="font-heading" style="font-size:26px; font-weight:700; letter-spacing:-0.03em; margin-bottom:8px;">
        Tell us about yourself
      </h1>
      <p class="text-sm text-muted" style="margin-bottom:32px;">
        We use this to personalise your predictions. You can change it anytime.
      </p>

      <!-- Form -->
      <form id="profile-form" novalidate>

        <!-- Percentile -->
        <div class="form-group">
          <label class="form-label" for="percentile">MHT-CET Percentile</label>
          <input class="form-input" type="number" id="percentile" name="percentile"
                 placeholder="e.g. 95.50" min="0" max="100" step="0.01"
                 inputmode="decimal" required/>
          <span class="form-hint">Enter your actual percentile from the MHT-CET result card.</span>
        </div>

        <!-- Category -->
        <div class="form-group">
          <label class="form-label" for="category">Reservation Category</label>
          <select class="form-select" id="category" name="category" required>
            <option value="" disabled selected>Select your category</option>
            <optgroup label="General / OBC / Minorities">
              <option value="GOOPENS">GOOPENS — General Open</option>
              <option value="GOBCS">GOBCS — OBC</option>
              <option value="GVJNT">GVJNT — VJ / NT</option>
              <option value="GSCS">GSCS — SC</option>
              <option value="GSTS">GSTS — ST</option>
              <option value="GSEBC">GSEBC — EBC / EWS</option>
              <option value="GPWDS">GPWDS — PwD</option>
            </optgroup>
            <optgroup label="Local / Home University">
              <option value="LOPENS">LOPENS — Local Open</option>
              <option value="LOBCS">LOBCS — Local OBC</option>
              <option value="LVJNT">LVJNT — Local VJ / NT</option>
              <option value="LSCS">LSCS — Local SC</option>
              <option value="LSTS">LSTS — Local ST</option>
              <option value="LSEBC">LSEBC — Local EBC / EWS</option>
              <option value="LPWDS">LPWDS — Local PwD</option>
            </optgroup>
          </select>
        </div>

        <!-- Stream -->
        <div class="form-group">
          <label class="form-label">Stream (PCM / PCB)</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="stream" value="PCM" id="stream-pcm" checked/>
              <span class="radio-label" for="stream-pcm">PCM</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="stream" value="PCB" id="stream-pcb"/>
              <span class="radio-label" for="stream-pcb">PCB</span>
            </label>
          </div>
          <span class="form-hint">PCM → Engineering (CET). PCB → Pharmacy / Agriculture (separate counselling).</span>
        </div>

        <div style="margin-top:8px;">
          <button type="submit" class="btn btn-primary btn-primary--full" id="btn-save-profile" style="height:56px; font-size:16px;">
            Save &amp; Continue
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          </button>
        </div>
      </form>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    protectPage();

    // Pre-fill if profile already exists
    const existing = getProfile();
    if (existing) {
      document.getElementById('percentile').value = existing.percentile ?? '';
      document.getElementById('category').value   = existing.category  ?? '';
      const streamInput = document.querySelector(`input[name="stream"][value="${existing.stream}"]`);
      if (streamInput) streamInput.checked = true;
    }

    document.getElementById('profile-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const pct = parseFloat(document.getElementById('percentile').value);
      const cat = document.getElementById('category').value;
      const stream = document.querySelector('input[name="stream"]:checked')?.value;

      if (isNaN(pct) || pct < 0 || pct > 100) {
        showToast('Enter a valid percentile between 0 and 100.', 'error');
        return;
      }
      if (!cat) {
        showToast('Please select your reservation category.', 'error');
        return;
      }

      const profile = { percentile: pct, category: cat, stream: stream || 'PCM' };
      localStorage.setItem('cetsure_profile', JSON.stringify(profile));
      showToast('Profile saved!', 'success');
      setTimeout(() => { window.location.href = 'predict.html'; }, 600);
    });
  </script>
</body>
</html>
