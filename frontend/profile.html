<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Profile Setup - CETSure</title>

    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/design-system.css" />

</head>

<body>

    <div class="container page">

        <div class="card">
            
            <div class="wizard-progress">
                <div class="wizard-step active">
                    <div class="wizard-step-dot">1</div>
                    <div class="wizard-step-label">Basic Profile</div>
                </div>
                <div class="wizard-step">
                    <div class="wizard-step-dot">2</div>
                    <div class="wizard-step-label">Find Colleges</div>
                </div>
            </div>

            <h1 class="gradient-text" style="display: block; text-align: center;">Set Up Your Profile</h1>

            <p class="subtitle" style="margin-bottom: var(--sp-6);">
                Complete your details to match cutoffs accurately.
            </p>

            <form id="profileForm">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required />
                    <p style="font-size: 10px; color: var(--c-text-muted); margin-top: 4px;">Used for personalizing your dashboard and forms.</p>
                </div>

                <div class="form-group">
                    <label>MHT-CET Percentile</label>
                    <input type="number" id="percentile" placeholder="Enter your percentile" min="0" max="100"
                        step="0.01" required />
                    <p style="font-size: 10px; color: var(--c-text-muted); margin-top: 4px;">Enter exact percentile up to 2 decimal places (e.g., 98.45).</p>
                </div>

                <div class="form-group">
                    <label>Category (Seat Reservation)</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="GOPENS">OPEN</option>
                        <option value="GOBCS">OBC</option>
                        <option value="GSCS">SC</option>
                        <option value="GSTS">ST</option>
                        <option value="GVJS">VJ</option>
                        <option value="GNT1S">NT1</option>
                        <option value="GNT2S">NT2</option>
                        <option value="GNT3S">NT3</option>
                        <option value="GSEBCS">SEBC</option>
                        <option value="EWS">EWS</option>
                    </select>
                    <p style="font-size: 10px; color: var(--c-text-muted); margin-top: 4px;">Reservation categories have lower cutoffs than GOPENS (Open General).</p>
                </div>

                <button type="submit" class="btn">
                    Save Profile &amp; Continue &rarr;
                </button>

            </form>

        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script src="js/config.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        requireAuth();

        // Prefill existing profile if available
        const existingProfile = getProfile();

        if (existingProfile) {
            document.getElementById("fullName").value =
                existingProfile.fullName || "";

            document.getElementById("percentile").value =
                existingProfile.percentile || "";

            document.getElementById("category").value =
                existingProfile.category || "";
        }

        const profileForm = document.getElementById("profileForm");

        profileForm.addEventListener("submit", function (e) {
            e.preventDefault();

            const profileData = {
                fullName: document.getElementById("fullName").value.trim(),
                percentile: parseFloat(
                    document.getElementById("percentile").value
                ),
                category: document.getElementById("category").value,
            };

            saveProfile(profileData);

            goTo(ROUTES.HOME);
        });
    </script>

</body>

</html>
